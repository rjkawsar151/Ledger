<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Advertising Budget & Ledger Management Portal - Track budgets, manage ledgers, generate bills and reports.">
    <title>AdBudget — Advertising Budget & Ledger Manager</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
</head>

<body>

    <!-- Login Screen -->
    <div id="loginScreen" class="login-screen">
        <div class="login-container">
            <div class="login-logo">
                <div class="login-icon"><i class="fas fa-chart-line"></i></div>
                <h1>AdBudget</h1>
                <p>Advertising Budget & Ledger Manager</p>
            </div>
            <form id="loginForm" onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" id="loginEmail" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password" required>
                </div>
                <div id="loginError" class="login-error" style="display:none"></div>
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Sign In
                </button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="appContainer" class="app-container" style="display:none">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-chart-line"></i>
                    <span>AdBudget</span>
                </div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
                    <i class="fas fa-th-large"></i><span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-page="companies" onclick="navigate('companies')">
                    <i class="fas fa-building"></i><span>Companies</span>
                </a>
                <a href="#" class="nav-item" data-page="ledger" onclick="navigate('ledger')">
                    <i class="fas fa-book"></i><span>Ledger</span>
                </a>
                <a href="#" class="nav-item" data-page="reports" onclick="navigate('reports')">
                    <i class="fas fa-file-alt"></i><span>Reports</span>
                </a>
                <div class="nav-group">
                    <a href="#" class="nav-item nav-group-toggle" onclick="toggleSettingsMenu(event)">
                        <i class="fas fa-cog"></i><span>Settings</span>
                        <i class="fas fa-chevron-down nav-arrow"></i>
                    </a>
                    <div class="nav-submenu" id="settingsSubmenu">
                        <a href="#" class="nav-item sub" data-page="generate-bill" onclick="navigate('generate-bill')">
                            <i class="fas fa-file-invoice-dollar"></i><span>Generate Bill</span>
                        </a>
                        <a href="#" class="nav-item sub" data-page="load-requests" onclick="navigate('load-requests')">
                            <i class="fas fa-money-check-alt"></i><span>Load Requests</span>
                        </a>
                        <a href="#" class="nav-item sub" data-page="ads-bills" onclick="navigate('ads-bills')">
                            <i class="fas fa-file-invoice"></i><span>Monthly Ads Bill</span>
                        </a>
                        <a href="#" class="nav-item sub" data-page="saved-bills" onclick="navigate('saved-bills')">
                            <i class="fas fa-archive"></i><span>Saved Bills</span>
                        </a>
                    </div>
                </div>
            </nav>
            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="user-avatar"><i class="fas fa-user"></i></div>
                    <div class="user-info">
                        <span class="user-name">Kawsar Hosen</span>
                        <span class="user-role">Admin</span>
                    </div>
                </div>
                <a href="#" class="nav-item logout-btn" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i><span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <button class="mobile-menu-btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 id="pageTitle">Dashboard</h2>
                <div class="topbar-right">
                    <span class="topbar-date" id="currentDate"></span>
                </div>
            </header>
            <div class="content-area" id="contentArea">
                <!-- Dynamic content injected here -->
            </div>
        </main>
    </div>

    <!-- Overlay for mobile sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <!-- Modal Container -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
        <div class="modal" id="modalContent"></div>
    </div>

    <!-- Document Viewer Modal -->
    <div class="modal-overlay" id="docViewerOverlay" style="display:none" onclick="closeDocViewer()">
        <div class="doc-viewer-modal" onclick="event.stopPropagation()">
            <div class="doc-viewer-header">
                <h3>Document Viewer</h3>
                <button class="btn-icon" onclick="closeDocViewer()"><i class="fas fa-times"></i></button>
            </div>
            <div class="doc-viewer-body" id="docViewerBody"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
